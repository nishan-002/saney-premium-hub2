<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Page</title>
<style>
body {
  background: #0b0b0b;
  font-family: 'Orbitron', sans-serif;
  color: #fff;
  text-align: center;
  padding: 40px;
}
h1 { color: #00ffff; text-shadow: 0 0 10px #00ffff; }
input {
  margin: 10px 0;
  padding: 10px;
  width: 300px;
  border-radius: 8px;
  border: 2px solid #00ffff;
  background: #111;
  color: #fff;
}
button {
  padding: 10px 20px;
  border-radius: 8px;
  border: none;
  background: #00ffff;
  color: #0b0b0b;
  font-weight: bold;
  cursor: pointer;
  margin-top: 20px;
  box-shadow: 0 0 15px #00ffff;
  text-shadow: 0 0 5px #fff;
  transition: transform 0.2s, box-shadow 0.3s;
}
button:hover {
  box-shadow: 0 0 35px #00ffff, 0 0 70px #00ffff;
  transform: scale(1.05);
}
</style>
</head>
<body>

<h1>Payment Details</h1>

<p>Bank: ABC Bank</p>
<p>Account No: Coming soon payment with e sewa</p>
<p>eSewa QR: <img src="qr n.jpeg" style="width:150px;"></p>

<h2>Fill Your Details</h2>

<input type="text" id="name" placeholder="Your Name"><br>
<input type="text" id="phone" placeholder="Phone Number"><br>
<input type="text" id="address" placeholder="Address"><br>

<input type="hidden" id="productName">
<input type="hidden" id="productPrice">

<button onclick="paid()">I Paid</button>
<br><br>
<button onclick="window.location.href='index.html'">Back to Shop</button>

<script>
const urlParams = new URLSearchParams(window.location.search);
document.getElementById('productName').value = urlParams.get('name');
document.getElementById('productPrice').value = urlParams.get('price');

function paid() {
  const name = document.getElementById('name').value;
  const phone = document.getElementById('phone').value;
  const address = document.getElementById('address').value;
  const product = document.getElementById('productName').value;
  const price = document.getElementById('productPrice').value;

  if(!name || !phone || !address) {
    alert("Please fill all fields");
    return;
  }

  const message = `Hello, I paid for ${product}, Price NPR ${price}. My Name: ${name}, Phone: ${phone}, Address: ${address}`;
  const whatsappUrl = `https://wa.me/9779822916017?text=${encodeURIComponent(message)}`;
  window.open(whatsappUrl, "_blank");
  alert("Payment confirmed! WhatsApp message sent.");
}
</script>

</body>
</html>
